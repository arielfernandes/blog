name: Post to LinkedIn

on:
  push:
    branches:
      - main
    paths:
      - 'content/posts/**.md'

jobs:
  post-linkedin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout com histórico
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detectar novo post
        id: detect
        run: |
          NEW_FILE=$(git diff --name-status HEAD~1 HEAD -- 'content/posts/*.md' | grep '^A' | awk '{print $2}' | head -1)
          echo "Arquivo detectado: $NEW_FILE"
          echo "new_post=$NEW_FILE" >> $GITHUB_OUTPUT

      - name: Configurar Python
        if: steps.detect.outputs.new_post != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        if: steps.detect.outputs.new_post != ''
        run: pip install requests python-frontmatter

      - name: Publicar no LinkedIn
        if: steps.detect.outputs.new_post != ''
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          python scripts/post_linkedin.py "${{ steps.detect.outputs.new_post }}"

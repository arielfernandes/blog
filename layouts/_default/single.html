{{ define "main" }}
    <header class="content__header">
        <h1>{{ .Title }}</h1> </header>

    <div class="content__body">
        <ul class="post-list">
            {{ range .Pages }}
                <li class="post-item">
                    <a href="{{ .Permalink }}">
                        <span class="post-date">{{ .Date.Format "02/01/2006" }}</span> -
                        {{ .Title | markdownify }}
                    </a>
                </li>
            {{ end }}
        </ul>
    </div>
{{ end }}
